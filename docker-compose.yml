services:
    app:
        image: php:8.2-fpm
        container_name: laravel_app
        working_dir: /var/www
        volumes:
            - .:/var/www

    redis:
        image: redis:alpine
        container_name: redis_server
        ports:
            - "6379:6379"

    nginx:
        image: nginx:alpine
        container_name: nginx_server
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
